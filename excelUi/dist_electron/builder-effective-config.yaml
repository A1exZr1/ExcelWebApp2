directories:
  output: dist_electron
  buildResources: build
appId: com.yourcompany.excelapp
productName: Excel Processor
files:
  - filter:
      - dist/**/*
      - electron.mjs
extraResources:
  - from: ../ExcelWebApp2/bin/Release/net8.0/win-x64/publish
    to: publish
    filter:
      - '**/*'
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
electronVersion: 37.2.1
